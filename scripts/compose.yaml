services:
  memoark:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
      args:
        VERSION: dev
        COMMIT: local
    image: memoark:dev
    container_name: memoark
    volumes:
      - memoark-data:/var/opt/memos
    ports:
      - "127.0.0.1:5230:5230"
    restart: unless-stopped

volumes:
  memoark-data:
    name: memoark-data
